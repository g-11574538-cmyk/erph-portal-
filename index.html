<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-RPH Portal</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Navigation Tabs -->
        <div class="flex justify-center space-x-4 mb-6">
            <button id="tabTeacherBtn" onclick="switchTab('teacher')" class="px-6 py-2 rounded-lg font-bold bg-blue-600 text-white shadow">Teacher Form</button>
            <button id="tabAdminBtn" onclick="switchTab('admin')" class="px-6 py-2 rounded-lg font-bold bg-gray-200 text-gray-700 hover:bg-gray-300">Principal Portal</button>
        </div>

        <!-- TEACHER SUBMISSION FORM -->
        <div id="teacherView" class="bg-white shadow-xl rounded-2xl p-6 md:p-8 border border-gray-100">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-blue-600">E-RPH Submission Portal</h1>
                <p class="text-gray-500 mt-1 font-medium">Submit your daily lesson plan directly to the database</p>
            </div>

            <form id="erphForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Teacher Name</label>
                        <input type="text" id="teacherName" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="e.g., Cikgu Ahmad">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Week Number</label>
                        <input type="number" id="week" min="1" max="52" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="e.g., 12">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Subject Dropdown -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Subject</label>
                        <select id="subject" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white">
                            <option value="">-- Select Subject --</option>
                            <option value="Bahasa Melayu">Bahasa Melayu</option>
                            <option value="English">English</option>
                            <option value="Matematik">Matematik</option>
                            <option value="Sains">Sains</option>
                            <option value="Reka Bentuk & Teknologi (RBT)">Reka Bentuk & Teknologi (RBT)</option>
                            <option value="Sejarah">Sejarah</option>
                            <option value="Pendidikan Islam">Pendidikan Islam</option>
                            <option value="Pendidikan Moral">Pendidikan Moral</option>
                            <option value="Pendidikan Seni Visual (PSV)">Pendidikan Seni Visual (PSV)</option>
                            <option value="Pendidikan Jasmani & Kesihatan">Pendidikan Jasmani & Kesihatan</option>
                            <option value="Pendidikan Muzik">Pendidikan Muzik</option>
                        </select>
                    </div>
                    <!-- Class Dropdown -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Class / Grade</label>
                        <select id="className" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white">
                            <option value="">-- Select Class --</option>
                            <option value="Prasekolah">Prasekolah</option>
                            <option value="Tahun 1">Tahun 1</option>
                            <option value="Tahun 2">Tahun 2</option>
                            <option value="Tahun 3">Tahun 3</option>
                            <option value="Tahun 4">Tahun 4</option>
                            <option value="Tahun 5">Tahun 5</option>
                            <option value="Tahun 6">Tahun 6</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Learning Objectives</label>
                    <textarea id="objectives" rows="3" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="What should students achieve?"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Learning Activities</label>
                    <textarea id="activities" rows="4" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Step 1, Step 2, Step 3..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Reflection</label>
                    <textarea id="reflection" rows="3" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="How did the lesson go?"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                    Submit E-RPH
                </button>
            </form>
        </div>

        <!-- PRINCIPAL / ADMIN PORTAL -->
        <div id="adminView" class="hidden bg-white shadow-xl rounded-2xl p-6 md:p-8 border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Principal Review Panel</h2>
                    <p class="text-sm text-gray-500">Review and approve submitted lesson plans</p>
                </div>
                <button onclick="loadAdminData()" class="px-4 py-2 bg-blue-50 text-blue-600 font-semibold rounded-lg hover:bg-blue-100">Refresh Data</button>
            </div>

            <div id="adminContent" class="overflow-x-auto">
                <p class="text-gray-500 italic">Enter PIN to load submissions...</p>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        // ⚠️ REPLACE THE LINK BELOW WITH YOUR GOOGLE APPS SCRIPT WEB APP URL ⚠️
        // =========================================================================
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbwT0bQGnMgcbopWbeY-bbPhA7APOVTVpylkDlFA2uPvttdXuVzuAzgaUeeRdEyTpdxj/exec';
        
        const ADMIN_PIN = "1234"; // Default Principal PIN to unlock admin portal

        // Tab Switcher Function
        function switchTab(tab) {
            const teacherView = document.getElementById('teacherView');
            const adminView = document.getElementById('adminView');
            const teacherBtn = document.getElementById('tabTeacherBtn');
            const adminBtn = document.getElementById('tabAdminBtn');

            if (tab === 'teacher') {
                teacherView.classList.remove('hidden');
                adminView.classList.add('hidden');
                teacherBtn.className = "px-6 py-2 rounded-lg font-bold bg-blue-600 text-white shadow";
                adminBtn.className = "px-6 py-2 rounded-lg font-bold bg-gray-200 text-gray-700 hover:bg-gray-300";
            } else {
                const pin = prompt("Enter Principal Access PIN:");
                if (pin === ADMIN_PIN) {
                    teacherView.classList.add('hidden');
                    adminView.classList.remove('hidden');
                    adminBtn.className = "px-6 py-2 rounded-lg font-bold bg-blue-600 text-white shadow";
                    teacherBtn.className = "px-6 py-2 rounded-lg font-bold bg-gray-200 text-gray-700 hover:bg-gray-300";
                    loadAdminData();
                } else if (pin !== null) {
                    alert("Incorrect PIN!");
                }
            }
        }

        // Form Submit Listener
        document.getElementById('erphForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Submitting...';

            const payload = {
                teacherName: document.getElementById('teacherName').value,
                week: document.getElementById('week').value,
                subject: document.getElementById('subject').value,
                className: document.getElementById('className').value,
                objectives: document.getElementById('objectives').value,
                activities: document.getElementById('activities').value,
                reflection: document.getElementById('reflection').value
            };

            fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert('E-RPH Submitted Successfully!');
                document.getElementById('erphForm').reset();
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit E-RPH';
            })
            .catch(err => {
                alert('Submission error. Please check your web app URL.');
                console.error(err);
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit E-RPH';
            });
        });

        // Load Submissions into Admin Panel
        function loadAdminData() {
            const adminContent = document.getElementById('adminContent');
            adminContent.innerHTML = '<p class="text-blue-600 font-semibold animate-pulse">Loading records from Google Sheets...</p>';

            fetch(scriptUrl)
                .then(res => res.json())
                .then(data => {
                    if (data.length === 0) {
                        adminContent.innerHTML = '<p class="text-gray-500">No submissions found.</p>';
                        return;
                    }

                    let html = `<table class="w-full text-left border-collapse min-w-[700px]">
                        <thead>
                            <tr class="bg-gray-50 text-gray-700 text-xs uppercase font-bold border-b">
                                <th class="p-3">Teacher</th>
                                <th class="p-3">Wk/Sub/Class</th>
                                <th class="p-3">Objectives & Activities</th>
                                <th class="p-3">Status</th>
                                <th class="p-3">Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y text-sm">`;

                    data.reverse().forEach(item => {
                        const statusBadge = item.status === 'Approved' 
                            ? '<span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold">Approved</span>'
                            : item.status === 'Rejected'
                            ? '<span class="px-2 py-1 bg-red-100 text-red-700 rounded-full text-xs font-bold">Rejected</span>'
                            : '<span class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded-full text-xs font-bold">Pending</span>';

                        html += `<tr>
                            <td class="p-3 font-semibold text-gray-800">${item.teacherName}</td>
                            <td class="p-3 text-xs text-gray-600">Wk ${item.week}<br>${item.subject}<br><b>${item.className}</b></td>
                            <td class="p-3 max-w-xs text-xs">
                                <b>Obj:</b> ${item.objectives}<br>
                                <b>Act:</b> ${item.activities}<br>
                                <b>Ref:</b> ${item.reflection}
                            </td>
                            <td class="p-3">${statusBadge}</td>
                            <td class="p-3 space-x-1">
                                <button onclick="updateStatus(${item.rowIndex}, 'Approved')" class="px-3 py-1 bg-green-600 text-white rounded text-xs hover:bg-green-700">Approve</button>
                                <button onclick="updateStatus(${item.rowIndex}, 'Rejected')" class="px-3 py-1 bg-red-600 text-white rounded text-xs hover:bg-red-700">Reject</button>
                            </td>
                        </tr>`;
                    });

                    html += '</tbody></table>';
                    adminContent.innerHTML = html;
                })
                .catch(err => {
                    adminContent.innerHTML = '<p class="text-red-500">Error fetching data. Ensure Google Sheet is accessible.</p>';
                });
        }

        // Action function to update row status
        function updateStatus(rowIndex, newStatus) {
            fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "updateStatus", rowIndex: rowIndex, status: newStatus })
            })
            .then(() => {
                alert(`Status updated to ${newStatus}`);
                loadAdminData();
            });
        }
    </script>
</body>
</html>
